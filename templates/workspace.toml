[workspace]
members = [
{%- for service in services %}
    "services/{{ service.name }}",
{%- endfor %}
{%- if tools %}
{%- for tool in tools %}
    "tools/{{ tool.name }}",
{%- endfor %}
{%- endif %}
]
resolver = "2"

[workspace.package]
version = "{{ project.version }}"
edition = "2021"
rust-version = "{{ project.rust_version | default(value="1.80") }}"
authors = ["Generated by RuneWeave"]
repository = "{{ project.repository | default(value="") }}"
license = "{{ project.license | default(value="MIT OR Apache-2.0") }}"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.release-wasm]
inherits = "release"
opt-level = "z"
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: {{ project.rust_version | default(value="stable") }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ "{{" }} env.RUST_VERSION {{ "}}" }}
        targets: x86_64-unknown-linux-musl,wasm32-unknown-unknown
        components: rustfmt,clippy
    
    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ "{{" }} runner.os {{ "}}" }}-cargo-${{ "{{" }} hashFiles('**/Cargo.lock') {{ "}}" }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    
    - name: Test
      run: cargo test --workspace --all-features
    
    - name: Build x86_64-musl
      run: cargo build --release --target x86_64-unknown-linux-musl
    
    - name: Build wasm32
      run: cargo build --release --target wasm32-unknown-unknown

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Syft
      uses: anchore/sbom-action/download-syft@v0
    
    - name: Generate SBOM
      run: syft dir:. -o spdx-json > sbom.spdx.json
    
    - name: Upload SBOM
      uses: actions/upload-artifact@v3
      with:
        name: sbom
        path: sbom.spdx.json

  sign:
    name: Sign artifacts
    runs-on: ubuntu-latest
    needs: [test, sbom]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ "{{" }} env.RUST_VERSION {{ "}}" }}
        targets: x86_64-unknown-linux-musl
    
    - name: Build release
      run: cargo build --release --target x86_64-unknown-linux-musl
    
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3
    
    - name: Sign binary
      run: |
        cosign sign-blob \
          --yes \
          --output-signature target/x86_64-unknown-linux-musl/release/{{ project.name }}.sig \
          --output-certificate target/x86_64-unknown-linux-musl/release/{{ project.name }}.crt \
          target/x86_64-unknown-linux-musl/release/{{ project.name }}